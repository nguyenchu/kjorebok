name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Validate and deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @kjorebok/api exec prisma generate

      - name: Build
        run: pnpm build

      - name: Start SSH agent
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          {
            echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK"
            echo "SSH_AGENT_PID=$SSH_AGENT_PID"
          } >> "$GITHUB_ENV"

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          PROD_BRANCH: ${{ secrets.PROD_BRANCH }}
        run: >
          ssh "$PROD_USER@$PROD_HOST"
          "cd '$PROD_APP_DIR' &&
          git fetch origin '${PROD_BRANCH:-main}' &&
          git checkout '${PROD_BRANCH:-main}' &&
          bash deploy/deploy.sh"
