name: Publish Android APK

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "deploy/publish-android-apk.sh"
      - ".github/workflows/publish-android-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish Android APK
    runs-on: ubuntu-latest
    environment: production

    env:
      EXPO_PUBLIC_API_URL: https://kjorebok.nguyenchu.com/api
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute Android version
        working-directory: apps/mobile
        run: |
          node <<'EOF'
          const fs = require("fs");

          const appConfig = JSON.parse(fs.readFileSync("app.json", "utf8"));
          const configuredVersion = appConfig.expo.version;
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(configuredVersion);

          if (!match) {
            throw new Error(`Expected expo.version to be semver, got: ${configuredVersion}`);
          }

          const [, major, minor] = match;
          const versionCode = process.env.GITHUB_RUN_NUMBER;
          const appVersion = `${major}.${minor}.${versionCode}`;

          fs.writeFileSync(
            process.env.GITHUB_ENV,
            `APP_VERSION=${appVersion}\nANDROID_VERSION_CODE=${versionCode}\n`,
            { flag: "a" }
          );
          EOF

      - name: Build Android release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Prepare Android metadata
        run: |
          cat > android-latest.json <<EOF
          {
            "version": "${APP_VERSION}",
            "versionCode": ${ANDROID_VERSION_CODE},
            "publishedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            android-latest.json
          if-no-files-found: error

      - name: Start SSH agent
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
          {
            echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK"
            echo "SSH_AGENT_PID=$SSH_AGENT_PID"
          } >> "$GITHUB_ENV"

      - name: Add server host key
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "Missing required secret: DEPLOY_HOST" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          touch ~/.ssh/known_hosts
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/known_hosts

      - name: Publish APK to server
        run: |
          scp apps/mobile/android/app/build/outputs/apk/release/app-release.apk android-latest.json "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo mkdir -p /var/www/kjorebok-downloads && \
            sudo cp /tmp/app-release.apk /var/www/kjorebok-downloads/android.apk && \
            sudo cp /tmp/android-latest.json /var/www/kjorebok-downloads/android-latest.json && \
            sudo chmod 644 /var/www/kjorebok-downloads/android.apk /var/www/kjorebok-downloads/android-latest.json"
